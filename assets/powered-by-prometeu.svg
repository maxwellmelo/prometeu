<svg xmlns="http://www.w3.org/2000/svg" width="180" height="28" role="img" aria-label="Powered by Prometeu">
  <title>Powered by Prometeu</title>
  <linearGradient id="bg" x2="0" y2="100%">
    <stop offset="0" stop-color="#1a1a2e"/>
    <stop offset="1" stop-color="#0f0f1e"/>
  </linearGradient>
  <linearGradient id="accent" x2="100%" y2="0">
    <stop offset="0" stop-color="#7c3aed"/>
    <stop offset="1" stop-color="#ec4899"/>
  </linearGradient>
  <clipPath id="r"><rect width="180" height="28" rx="4"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="180" height="28" fill="url(#bg)"/>
    <rect width="180" height="2" fill="url(#accent)"/>
    <rect y="26" width="180" height="2" fill="url(#accent)"/>
  </g>
  <g fill="#fff" text-anchor="start" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11">
    <text x="12" y="18" fill="#a78bfa" font-weight="500">Powered by</text>
    <text x="76" y="18" font-weight="700" fill="url(#accent)">PROMETEU</text>
  </g>
</svg>
